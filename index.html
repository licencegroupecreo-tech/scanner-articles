<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scanner Articles</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a;
  --accent:#4f8ef7; --accent2:#3dd68c;
  --text:#f0f2ff; --text2:#8890b0;
  --border:rgba(255,255,255,0.08);
  --red:#f75f5f; --yellow:#f7c94f;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; }
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; transition:opacity 0.2s; }
.screen.hidden { opacity:0; pointer-events:none; }

/* LOGIN */
#screen-login { gap:32px; }
.login-logo { width:72px; height:72px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:36px; }
.login-title { font-size:26px; font-weight:700; text-align:center; }
.login-sub { font-size:14px; color:var(--text2); margin-top:4px; text-align:center; }
.login-form { width:100%; max-width:320px; display:flex; flex-direction:column; gap:12px; }
.pin-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 20px; font-size:18px; color:var(--text); letter-spacing:4px; text-align:center; outline:none; }
.pin-input:focus { border-color:var(--accent); }
.pin-input::placeholder { letter-spacing:0; font-size:15px; color:var(--text2); }
.btn-primary { width:100%; background:var(--accent); color:white; border:none; border-radius:14px; padding:16px; font-size:16px; font-weight:600; cursor:pointer; }
.btn-primary:active { opacity:0.85; }
.login-error { font-size:13px; color:var(--red); text-align:center; min-height:18px; }

/* SCAN */
#screen-scan { padding:0; justify-content:flex-start; background:#000; }

#video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
#scan-canvas { position:absolute; inset:0; width:100%; height:100%; display:none; }

/* Overlay header */
.scan-header {
  position:absolute; top:0; left:0; right:0; z-index:20;
  padding:max(16px,env(safe-area-inset-top)) 20px 20px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);
  display:flex; justify-content:space-between; align-items:center;
}
.scan-title { font-size:17px; font-weight:600; }
.btn-logout { background:rgba(255,255,255,0.15); border:none; border-radius:20px; padding:8px 14px; color:white; font-size:13px; cursor:pointer; }

/* Cadre de visée */
.scan-frame-wrap {
  position:absolute; inset:0; z-index:10;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; pointer-events:none;
}
.scan-frame {
  width:280px; height:140px; position:relative;
}
.corner {
  position:absolute; width:26px; height:26px;
  border-color:white; border-style:solid;
}
.corner-tl { top:0; left:0; border-width:3px 0 0 3px; border-radius:3px 0 0 0; }
.corner-tr { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 3px 0 0; }
.corner-bl { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 3px; }
.corner-br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 3px 0; }
.scan-line { position:absolute; left:4px; right:4px; height:2px; background:linear-gradient(to right,transparent,var(--accent),transparent); animation:sl 1.8s ease-in-out infinite; top:0; }
@keyframes sl { 0%{top:4px;opacity:1} 90%{top:calc(100% - 4px);opacity:1} 100%{top:calc(100% - 4px);opacity:0} }
.scan-hint { font-size:14px; color:rgba(255,255,255,0.85); text-shadow:0 1px 6px rgba(0,0,0,0.8); text-align:center; }

/* Status scan en bas */
.scan-status {
  position:absolute; left:0; right:0; z-index:20;
  bottom:0;
  padding:20px 20px max(20px,env(safe-area-inset-bottom));
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
  display:flex; flex-direction:column; gap:10px; align-items:center;
}
.fps-badge { font-size:11px; color:rgba(255,255,255,0.45); }
.manual-row { width:100%; display:flex; gap:10px; }
.input-manual { flex:1; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; padding:13px 16px; color:white; font-size:15px; outline:none; }
.input-manual::placeholder { color:rgba(255,255,255,0.4); }
.btn-ok { background:var(--accent); border:none; border-radius:12px; padding:13px 20px; color:white; font-size:15px; font-weight:600; cursor:pointer; }

/* LOADING */
#screen-loading { gap:16px; }
.loader { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.loader-text { font-size:14px; color:var(--text2); }

/* RESULT */
#screen-result { gap:20px; justify-content:flex-start; padding-top:max(56px,env(safe-area-inset-top)); overflow-y:auto; }
.result-header { width:100%; max-width:420px; display:flex; align-items:center; gap:12px; }
.btn-back { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 16px; color:var(--text2); font-size:14px; cursor:pointer; flex-shrink:0; }
.result-ean { font-size:12px; color:var(--text2); font-family:monospace; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:20px; }
.card-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
.card-code { font-size:13px; color:var(--accent); font-family:monospace; margin-bottom:12px; }
.card-name { font-size:20px; font-weight:700; line-height:1.3; }
.divider { height:1px; background:var(--border); margin:16px 0; }
.location-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.loc-item { background:var(--surface2); border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:4px; }
.loc-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.07em; }
.loc-value { font-size:26px; font-weight:800; color:var(--accent2); }
.no-location { background:rgba(247,201,79,0.08); border:1px solid rgba(247,201,79,0.2); border-radius:14px; padding:14px 16px; font-size:14px; color:var(--yellow); display:flex; align-items:center; gap:10px; }
.error-card { width:100%; max-width:420px; background:rgba(247,95,95,0.08); border:1px solid rgba(247,95,95,0.2); border-radius:20px; padding:28px 24px; display:flex; flex-direction:column; align-items:center; gap:12px; text-align:center; }
.error-title { font-size:18px; font-weight:700; color:var(--red); }
.btn-scan-again { width:100%; max-width:420px; background:var(--accent); border:none; border-radius:14px; padding:18px; color:white; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 6px 20px rgba(79,142,247,0.3); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="screen-login">
  <div class="login-logo">🔍</div>
  <div><div class="login-title">Scanner Articles</div><div class="login-sub">Accès réservé aux employés</div></div>
  <div class="login-form">
    <input class="pin-input" type="password" id="pin-input" placeholder="Mot de passe" autocomplete="current-password">
    <div class="login-error" id="login-error"></div>
    <button class="btn-primary" onclick="checkPin()">Accéder</button>
  </div>
</div>

<!-- SCAN -->
<div class="screen hidden" id="screen-scan">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="scan-canvas"></canvas>

  <div class="scan-header">
    <span class="scan-title">Scanner un article</span>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>

  <div class="scan-frame-wrap">
    <div class="scan-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-line"></div>
    </div>
    <div class="scan-hint">Centrez le code-barres dans le cadre</div>
  </div>

  <div class="scan-status">
    <div class="fps-badge" id="fps-badge"></div>
    <div class="manual-row">
      <input class="input-manual" type="number" id="manual-ean" placeholder="Saisie manuelle EAN…">
      <button class="btn-ok" onclick="searchManual()">OK</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="screen hidden" id="screen-loading">
  <div class="loader"></div>
  <div class="loader-text" id="loader-text">Chargement…</div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="screen-result">
  <div class="result-header">
    <button class="btn-back" onclick="backToScan()">← Retour</button>
    <span class="result-ean" id="result-ean-display"></span>
  </div>
  <div id="result-content"></div>
  <button class="btn-scan-again" onclick="backToScan()">📷 Scanner un autre article</button>
</div>

<script>
var SHEET_ID    = '1jtxgWw8488lQWtHeYuReVv2ZlHh4MQXpTvJFZrq6egM';
var PASSWORD    = 'magasin2024';
var SESSION_KEY = 'scanner_auth';

var dbArticles     = null;
var dbEmplacements = null;
var videoEl        = document.getElementById('video');
var canvasEl       = document.getElementById('scan-canvas');
var ctx            = canvasEl.getContext('2d', { willReadFrequently: true });
var scanning       = false;
var locked         = false;
var rafId          = null;
var lastFpsTime    = Date.now();
var fpsFrames      = 0;

// ── NAVIGATION ──────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

// ── AUTH ────────────────────────────────
function checkPin() {
  var val = document.getElementById('pin-input').value.trim();
  if (val === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-error').textContent = '';
    startApp();
  } else {
    document.getElementById('login-error').textContent = 'Mot de passe incorrect.';
    document.getElementById('pin-input').value = '';
  }
}
document.getElementById('pin-input').addEventListener('keydown', function(e){ if(e.key==='Enter') checkPin(); });

function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  stopScanner();
  showScreen('screen-login');
}

// ── DONNÉES ─────────────────────────────
function parseCSVLine(line) {
  var r=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){r.push(cur);cur='';}else cur+=c;
  }
  r.push(cur); return r;
}
function parseCSV(text) {
  var lines=text.trim().split('\n');
  var hdrs=parseCSVLine(lines[0]).map(function(h){return h.trim().replace(/^"|"$/g,'');});
  return lines.slice(1).map(function(l){
    var v=parseCSVLine(l),o={};
    hdrs.forEach(function(h,i){o[h]=(v[i]||'').trim().replace(/^"|"$/g,'');});
    return o;
  });
}
function fetchSheet(name) {
  var url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(name);
  return fetch(url).then(function(r){if(!r.ok)throw 0;return r.text();}).then(parseCSV);
}
function loadData() {
  if(dbArticles&&dbEmplacements) return Promise.resolve();
  return Promise.all([fetchSheet('Articles'),fetchSheet('Emplacements')]).then(function(res){
    dbArticles={};
    res[0].forEach(function(r){var e=(r['EAN']||'').trim();if(e)dbArticles[e]=r;});
    dbEmplacements={};
    res[1].forEach(function(r){var c=(r['Code article']||'').trim();if(c)dbEmplacements[c]=r;});
  });
}

// ── SCANNER WASM ─────────────────────────
var zxingReader = null; // fonction readBarcodesFromImageData chargée dynamiquement

function loadZxing() {
  if (zxingReader) return Promise.resolve(zxingReader);
  return import('https://unpkg.com/zxing-wasm@1.3.4/dist/reader/index.js')
    .then(function(mod) {
      zxingReader = mod.readBarcodesFromImageData;
      return zxingReader;
    });
}

async function startScanner() {
  locked = false;
  scanning = false;
  showScreen('screen-scan');

  // Charger le moteur WASM en parallèle du démarrage caméra
  loadZxing().catch(function(e) {
    console.error('Erreur chargement zxing-wasm:', e);
    document.getElementById('fps-badge').textContent = 'Erreur moteur de scan — utilisez la saisie manuelle';
  });

  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    // Autofocus continu
    var track = stream.getVideoTracks()[0];
    if (track && track.applyConstraints) {
      track.applyConstraints({ advanced: [{ focusMode:'continuous' },{ exposureMode:'continuous' }] }).catch(()=>{});
    }

    scanning = true;
    scanLoop();
  } catch(e) {
    console.error('Camera:', e);
  }
}

async function scanLoop() {
  if (!scanning) return;

  if (videoEl.readyState >= 2 && !locked) {
    var vw = videoEl.videoWidth;
    var vh = videoEl.videoHeight;
    if (vw > 0 && vh > 0) {
      canvasEl.width  = vw;
      canvasEl.height = vh;
      ctx.drawImage(videoEl, 0, 0, vw, vh);
      var imageData = ctx.getImageData(0, 0, vw, vh);

      try {
        if (!zxingReader) { rafId = requestAnimationFrame(scanLoop); return; }
        var results = await zxingReader(imageData, {
          formats: ['EAN-13','EAN-8','Code128','UPC-A','UPC-E'],
          tryHarder: true
        });

        if (results && results.length > 0 && !locked) {
          locked = true;
          scanning = false;
          onEANDetected(results[0].text);
          return;
        }
      } catch(e) {}

      // FPS display
      fpsFrames++;
      var now = Date.now();
      if (now - lastFpsTime >= 1000) {
        document.getElementById('fps-badge').textContent = fpsFrames + ' img/s analysées';
        fpsFrames = 0;
        lastFpsTime = now;
      }
    }
  }

  rafId = requestAnimationFrame(scanLoop);
}

function stopScanner() {
  scanning = false;
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (videoEl.srcObject) {
    videoEl.srcObject.getTracks().forEach(function(t){ t.stop(); });
    videoEl.srcObject = null;
  }
}

// ── RÉSULTAT ─────────────────────────────
function onEANDetected(ean) {
  if (navigator.vibrate) navigator.vibrate([50,30,50]);
  stopScanner();
  showScreen('screen-loading');
  document.getElementById('loader-text').textContent = 'Recherche en cours…';
  loadData().then(function(){
    showResult(ean.toString().trim(), dbArticles[ean.toString().trim()]);
  }).catch(showResultError);
}

function showResult(ean, article) {
  document.getElementById('result-ean-display').textContent = 'EAN : '+ean;
  var c = document.getElementById('result-content');
  if (!article) {
    c.innerHTML='<div class="error-card"><div style="font-size:40px">🔍</div><div class="error-title">Article introuvable</div><div style="font-size:13px;color:var(--text2)">EAN : '+ean+'</div><div style="font-size:13px;color:var(--text2)">Ce code-barres ne figure pas dans la base.</div></div>';
    showScreen('screen-result'); return;
  }
  var code=(article['Code article']||'').trim();
  var lib=(article['Libellé article']||article['Libelle article']||'').trim();
  var emp=dbEmplacements[code];
  var locHTML='';
  if(emp){
    var al=(emp['Allée']||emp['Allee']||'—').trim();
    var tr=(emp['Travée']||emp['Travee']||'—').trim();
    var nv=(emp['Niveau']||'—').trim();
    var rg=(emp['Rang']||'—').trim();
    locHTML='<div class="location-grid">'+
      '<div class="loc-item"><div class="loc-label">Allée</div><div class="loc-value">'+al+'</div></div>'+
      '<div class="loc-item"><div class="loc-label">Travée</div><div class="loc-value">'+tr+'</div></div>'+
      '<div class="loc-item"><div class="loc-label">Niveau</div><div class="loc-value">'+nv+'</div></div>'+
      '<div class="loc-item"><div class="loc-label">Rang</div><div class="loc-value">'+rg+'</div></div>'+
    '</div>';
  } else {
    locHTML='<div class="no-location"><span>⚠️</span><span>Emplacement non défini pour cet article.</span></div>';
  }
  c.innerHTML='<div class="card"><div class="card-label">Code article</div><div class="card-code">'+code+'</div><div class="card-name">'+lib+'</div><div class="divider"></div><div class="card-label" style="margin-bottom:12px">Emplacement</div>'+locHTML+'</div>';
  showScreen('screen-result');
}

function showResultError() {
  document.getElementById('result-content').innerHTML='<div class="error-card"><div style="font-size:40px">⚠️</div><div class="error-title">Erreur de connexion</div><div style="font-size:13px;color:var(--text2)">Vérifiez votre connexion internet.</div></div>';
  showScreen('screen-result');
}

// ── SAISIE MANUELLE ──────────────────────
function searchManual() {
  var val=document.getElementById('manual-ean').value.trim();
  if(val.length>=8){document.getElementById('manual-ean').value='';onEANDetected(val);}
}
document.getElementById('manual-ean').addEventListener('keydown',function(e){if(e.key==='Enter')searchManual();});

function backToScan() { startScanner(); }

// ── DÉMARRAGE ────────────────────────────
async function startApp() {
  showScreen('screen-loading');
  document.getElementById('loader-text').textContent = 'Chargement des données…';
  try {
    await loadData();
    await startScanner();
  } catch(e) {
    document.getElementById('loader-text').textContent = 'Erreur de connexion. Réessayez.';
  }
}

if(sessionStorage.getItem(SESSION_KEY)){ startApp(); }
else { showScreen('screen-login'); }
</script>
</body>
</html>
